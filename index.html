<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./index.css">
    <title>Mágico dos Cálculos✨</title>

</head>
    <style>
        body{
            display: flex;
            background-color: purple;
            width: 100vw;
            height: 100vh;
            justify-content: center;
            align-items: center;
            overflow: hidden; 
        }

        h1{
            font-size: 50px;
            color: white;
            align-items: center;

        }
        .sub_titulo{
            margin: 21px;
            color: white;
            font-size: 30px;
        }
        p{
            color: white;
        }
        .container{
            display: flex;
            justify-content: center;
            flex-direction: column;
            align-items: center;
            flex-wrap: wrap;
            height: 50vh;
            width: 50vw;
            background-color: darkmagenta;
            border-radius: 20px;
            box-shadow: black 5px 5px 5px;
        }
        .funcao{
            height: 50px;
            width: 200px;
            border-radius: 20px;
            background-color:darkmagenta ;
            font-size: 20px;
            color: white;

        }
        .funcao:hover{
            cursor: pointer;
            transform: scale(1.05);
            box-shadow: 2px 4px 4px black;
            
        }

        .botoes{
            display: flex;
            flex-direction: column;
            gap: 7px;
        }
    </style>
<body>
    <div class="container">

        <h1>✨Mágico dos Cálculos🎩</h1>
        <p class="sub_titulo">Clique em um dos botões ao lado!</p>
        <div class="botoes">
            <button class="funcao" onclick="fazer_magica()">Veja a mágica!</button>
            <button class="funcao" onclick="fazer_magica_denovo()">Veja a mágica novamente!</button>
            <button class="funcao" onclick="explicar_a_magica()">Quer que eu explique?</button>
            <button class="funcao" onclick="magica_tripla()">Modo triplo</button>
            <button class="funcao" onclick="funcao_na_magica()">Modo "Fator escolhido"</button>
            <button class="funcao" onclick="apelido_na_magica()">Quer um apelido?</button>
        </div>

        <p>Para tentar denovo, aperte no botão novamente!</p>

    </div>


    
    <!--tudo que for de JS poe dentro do script-->
        <script>
            function fazer_magica(){
                alert('Bem vindo ao mágico da calculadora! Eu farei uma mágica que deixará seus cabelos ao céus!');

                let numero_aleatorio = Number(prompt('Primeiramente, digite o número que você deseja chegar: '));
                alert('Agora pegue sua calculadora e digite um número aleatorio e guarde ele em algum lugar: ');

                alert('Agora multiplique seu número por 2');
                let magica = numero_aleatorio * 2;

                alert('Agora adicione esse número ao seu número aleatório: '+magica+'🎆 agora caso você não lembre, seu número é: '+numero_aleatorio);
                alert('Agora divida ele por 2');
                alert('Agora subtraia pelo numero aleatorio');
                alert('ABRACADABA!!, agora você deve ter '+magica+'!');
                alert('Se funcionou parabéns, se não funcionou por favor, tente novamente!');
            }
            function fazer_magica_denovo(){
                alert('Bem vindo ao mágico da calculadora! Eu farei uma mágica que deixará seus cabelos ao céus!');

                let numero_desejado = Number(prompt('Primeiramente, digite o número que você deseja chegar: '));
                let numero_aleatorio = Number(prompt('Agora pegue sua calculadora e digite um número aleatorio e guarde ele em algum lugar: '));

                alert('Agora multiplique seu número por dois!🎀');
                let magica = numero_desejado * 2;

                alert('Agora adicione esse número ao seu número aleatório: '+magica+'🎆 agora caso você não lebre, seu número é: '+numero_aleatorio * 2);
                alert('Agora divida ele por 2');
                alert('Agora subtraia pelo numero aleatorio🎇');
                alert('ABRACADABA!!✨, agora você deve ter '+numero_desejado+'!');
                alert('Se funcionou parabéns🎉, se não funcionou por favor, tente novamente!❤');

            }
            function explicar_a_magica(){
                alert('Você sabe que um mágico nunca fala seus truques né? Mas como eu já fiz a mágico sinto que devo fazer uma excessão.');
                alert('Bem, a mágica funciona assim: ');
                alert('Primeiro eu peço o número que você quer que apareça na calculadora!');
                alert('Depois, dentro de minha mente eu multiplico ele por 2 ou 3, dependendo da opção que você escolheu!');
                alert('Após isso, eu peço para você colocar um número qualquer, sim essa mágica funciona com QUALQUER número!');
                alert('E peço para você multiplicar por dois, isso facilita a proxima etapa!');
                alert('Que é a adição! Aqui é onde acontece a mágica, pois lembra que eu falei que eu multipliquei o numero desejado por dois?');
                alert('Pois é! Após a multiplicação dos dois números peço para você somar eles para fazer a divisão!');
                alert('A divisão é crucial pois é aonde o seu numero desejado aparece, pois após dividir o resultado da adição por dois, seu número aparece por conta da multiplicação! Já a proxima etapa..');
                alert('É a subtração! Onde a mágica se revela e seu número apareçe!');
                alert('Espero ter conseguido explicar, se necessário só apertar o botão novamente!');

            }
            function magica_tripla(){
                alert('Bem vindo ao mágico da calculadora! Eu farei uma mágica que deixará seus cabelos ao céus!');

                let numero_desejado = Number(prompt('Primeiramente, digite o número que você deseja chegar: '));
                let numero_aleatorio = Number(prompt('Agora pegue sua calculadora e digite um número aleatorio e guarde ele em algum lugar: '));

                alert('Agora multiplique seu número por três!🎀');
                let magica = numero_desejado * 3;

                alert('Agora adicione esse número ao seu número aleatório: '+magica+'🎆 agora caso você não lembre, seu número é: '+numero_aleatorio * 2);
                alert('Agora divida ele por 3');
                alert('Agora subtraia pelo numero aleatorio🎇');
                alert('ABRACADABA!!✨, agora você deve ter '+numero_desejado+'!');
                alert('Se funcionou parabéns🎉, se não funcionou por favor, tente novamente!❤');

                }
            function funcao_na_magica(){
                alert('Bem vindo ao mágico da calculadora! Eu farei uma mágica que deixará seus cabelos ao céus!');

                let numero_desejado = Number(prompt('Primeiramente, digite o número que você deseja chegar: '));
                let numero_aleatorio = Number(prompt('Agora pegue sua calculadora e digite um número aleatorio e guarde ele em algum lugar: '));

                let fator_escolhido = Number(prompt('Agora digite um número para que seu número seja multiplicado: '));
                let magica = numero_desejado * fator_escolhido;

                alert('Agora adicione esse número ao seu número aleatório: '+magica+'🎆 caso você não lembre, seu número é: '+numero_aleatorio * fator_escolhido);
                alert('Agora divida ele por '+fator_escolhido);
                alert('Agora subtraia pelo numero aleatorio🎇');
                alert('ABRACADABA!!✨, agora você deve ter '+numero_desejado+'!');
                alert('Se funcionou parabéns🎉, se não funcionou por favor, tente novamente!❤');

                }
            function apelido_na_magica(){
                alert('Bem vindo ao mágico da calculadora! Eu farei uma mágica que deixará seus cabelos ao céus!');

                let numero_desejado = Number(prompt('Primeiramente, digite o número que você deseja chegar: '));
                let apelido = prompt('Vamos mudar um pouco? Me fale seu nome ou apelido para eu te chamar: ');
                alert('Obrigado '+apelido+', vamos continuar a mágica!');
                let numero_aleatorio = Number(prompt('Pegue sua calculadora e digite um número aleatorio e guarde ele em algum lugar: '));

                alert('Agora multiplique seu número por dois!🎀');
                let magica = numero_desejado * 2;
                alert('Agora adicione esse número ao seu número aleatório: '+magica+'🎆 agora caso você não lembre, seu número é: '+numero_aleatorio * 2);
                alert('Agora divida ele por 2');
                alert('Agora subtraia pelo numero aleatorio🎇');
                alert('ABRACADABA!!✨'+apelido+ ', agora você deve ter '+numero_desejado+'!');
                alert('Se funcionou parabéns🎉, se não funcionou por favor, tente novamente!❤');

                }

        </script>
  
</body>
</html>
